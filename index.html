<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DramaBox Downloader & Player</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background-color: #1e293b; padding: 25px; width: 100%; max-width: 460px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; border: 1px solid #334155; }
        h1 { color: #22d3ee; font-size: 24px; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 13px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; background-color: #020617; border: 1px solid #475569; border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #0891b2; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 15px; }
        button:hover { background-color: #06b6d4; }
        #resultBox { margin-top: 20px; display: none; }
        #resultBox p { color: #34d399; font-weight: bold; margin-bottom: 15px; font-size: 15px; }
        
        .player-container { 
            position: relative; 
            width: 100%; 
            height: 580px; 
            border-radius: 10px; 
            overflow: hidden; 
            border: 2px solid #0891b2; 
            background-color: black; 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .player-container iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>DramaBox Downloader & Player</h1>
        <p>क्लाउड पावर्ड - नो टर्मक्स रिक्वायर्ड</p>
        
        <input type="text" id="dramaUrl" placeholder="यहाँ ड्रामा लिंक पेस्ट करें...">
        <button onclick="getLink()">वीडियो लोड करें</button>

        <div id="resultBox">
            <p>✓ वीडियो सफलतापूर्वक लोड हो गया!</p>
            <div class="player-container">
                <iframe id="dramaPlayer" src="" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture" sandbox="allow-scripts allow-same-origin shrink-to-fit=yes"></iframe>
            </div>
        </div>
    </div>

    <script>
        function getLink() {
            const urlInput = document.getElementById('dramaUrl').value.trim();
            const resultBox = document.getElementById('resultBox');
            const player = document.getElementById('dramaPlayer');
            
            resultBox.style.display = 'none';
            if(!urlInput) { alert('कृपया पहले लिंक पेस्ट करें!'); return; }
            
            // ⚡ जुगाड़: अगर यूजर ऐप का डीप लिंक (app.dramaboxdb.com या android/open) डालेगा तो उसे यहीं रोक देंगे
            if (urlInput.includes('android/open') || urlInput.includes('app.dramaboxdb.com')) {
                alert('⚠️ सुरक्षा पाबंदी: यह एक ऐप-प्रोटेक्टेड डीप लिंक है जो ब्राउज़र में नहीं खुल सकता। कृपया क्रोम ब्राउज़र से कॉपी किया हुआ स्टैंडर्ड शेयर लिंक ही डालें!');
                return;
            }
            
            try {
                const urlObj = new URL(urlInput);
                const bookId = urlObj.searchParams.get('bid') || urlObj.searchParams.get('bookId');
                const cindex = urlObj.searchParams.get('cindex') || '0';
                
                if (!bookId) {
                    alert('त्रुटि: लिंक में ड्रामा ID (bid) नहीं मिली!');
                    return;
                }
                
                // ओरिजिनल वेब प्लेयर स्ट्रीम पाथ
                let embedUrl = `https://www.dramaboxdb.com/play?bid=${bookId}&cindex=${cindex}`;
                
                player.src = embedUrl;
                resultBox.style.display = 'block';
                
            } catch (err) {
                alert('कृपया एक सही ड्रामा यूआरएल लिंक डालें!');
            }
        }
    </script>
</body>
</html>
