    <script>
        async function getLink() {
            const urlInput = document.getElementById('dramaUrl').value;
            const resultBox = document.getElementById('resultBox');
            const downloadBtn = document.getElementById('downloadBtn');
            
            if(!urlInput) return alert('कृपया पहले लिंक पेस्ट करें!');
            
            // यह टेक्स्ट में से केवल https:// वाला असली लिंक निकाल लेगा
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const foundUrls = urlInput.match(urlRegex);
            
            if (!foundUrls) return alert('कृपया एक सही URL लिंक डालें!');
            const cleanUrl = foundUrls[0];
            
            try {
                const response = await fetch(`/fetch?url=${encodeURIComponent(cleanUrl)}`);
                const data = await response.json();
                
                if(data.success && data.video_url) {
                    downloadBtn.href = data.video_url;
                    resultBox.classList.remove('hidden');
                } else {
                    alert('त्रुटि: ' + (data.error || 'वीडियो लिंक नहीं मिल पाया।'));
                }
            } catch(err) {
                alert('सर्ver कनेक्ट नहीं हो पाया: ' + err.message);
            }
        }
    </script>
