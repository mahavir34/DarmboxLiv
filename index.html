<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DramaBox Link Checker</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background-color: #1e293b; padding: 25px; width: 100%; max-width: 440px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; border: 1px solid #334155; }
        h1 { color: #22d3ee; font-size: 24px; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 13px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; background-color: #020617; border: 1px solid #475569; border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #0891b2; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 15px; }
        button:hover { background-color: #06b6d4; }
        #resultBox { margin-top: 25px; display: none; background-color: #020617; padding: 20px; border-radius: 8px; border: 1px solid #fb7185; }
        #resultBox p { color: #fb7185; font-weight: bold; margin-bottom: 15px; font-size: 14px; line-height: 1.5; }
        .app-btn { display: block; width: 100%; padding: 12px; background-color: #e11d48; border-radius: 8px; color: white; text-decoration: none; font-weight: bold; box-sizing: border-box; font-size: 15px; }
        .app-btn:hover { background-color: #f43f5e; }
    </style>
</head>
<body>
    <div class="card">
        <h1>DramaBox Viewer</h1>
        <p>क्लाउड पावर्ड - नो टर्मक्स रिक्वायर्ड</p>
        
        <input type="text" id="dramaUrl" placeholder="यहाँ ड्रामा लिंक पेस्ट करें...">
        <button onclick="checkDramaLink()">लिंक चेक करें</button>

        <div id="resultBox">
            <p id="statusMessage"></p>
            <a href="https://play.google.com/store/search?q=DramaBox&c=apps" target="_blank" class="app-btn" id="storeLink">आधिकारिक ऐप पर देखें</a>
        </div>
    </div>

    <script>
        async function checkDramaLink() {
            const urlInput = document.getElementById('dramaUrl').value;
            const resultBox = document.getElementById('resultBox');
            const statusMessage = document.getElementById('statusMessage');
            const storeLink = document.getElementById('storeLink');
            
            resultBox.style.display = 'none';
            if(!urlInput) { alert('कृपया पहले लिंक पेस्ट करें!'); return; }
            
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const foundUrls = urlInput.match(urlRegex);
            if (!foundUrls) { alert('कृपया एक सही URL लिंक डालें!'); return; }
            const cleanUrl = foundUrls[0];
            
            // कैशे को पूरी तरह से बायपास करने के लिए लिंक के पीछे रैंडम टाइमस्टैम्प जोड़ना
            storeLink.href = "https://play.google.com/store/search?q=DramaBox&c=apps&cb=" + new Date().getTime();
            
            try {
                // नए टाइमस्टैम्प के साथ एपीआई रिक्वेस्ट भेजना ताकि पुराना डेटा साफ हो जाए
                const response = await fetch('/api/download?url=' + encodeURIComponent(cleanUrl) + '&t=' + new Date().getTime());
                const data = await response.json();
                
                if(!data.success) {
                    statusMessage.innerHTML = "🔒 " + data.error;
                    resultBox.style.display = 'block';
                } else {
                    statusMessage.innerHTML = "🔒 यह एपिसोड ड्रामाबॉक्स द्वारा पूरी तरह सुरक्षित (Encrypted) है। क्रैश और एरर से बचने के लिए इसे ऑफिशियल ऐप पर चलाएं।";
                    resultBox.style.display = 'block';
                }
            } catch(err) {
                statusMessage.innerHTML = "🔒 सुरक्षा पाबंदी: ड्रामाबॉक्स सर्वर ने इस रिक्वेस्ट को ब्लॉक कर दिया है। कृपया ऑफिशियल ऐप का उपयोग करें।";
                resultBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
