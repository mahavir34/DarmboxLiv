<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DramaBox Downloader & Player</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
        .card { background-color: #1e293b; padding: 25px; width: 100%; max-width: 500px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; border: 1px solid #334155; }
        h1 { color: #22d3ee; font-size: 24px; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 13px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; background-color: #020617; border: 1px solid #475569; border-radius: 8px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0891b2; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 15px; }
        button:hover { background-color: #06b6d4; }
        #resultBox { margin-top: 20px; display: none; }
        #resultBox p { color: #34d399; font-weight: bold; margin-bottom: 15px; }
        /* रिस्पॉन्सिव आईफ्रेम प्लेयर */
        .player-container { position: relative; width: 100%; padding-bottom: 140%; /* वर्टिकल रील्स/ड्रामा फॉर्मेट के लिए */ height: 0; border-radius: 8px; overflow: hidden; border: 1px solid #475569; background-color: black; }
        .player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>DramaBox Downloader & Player</h1>
        <p>क्लाउड पावर्ड - नो टर्मक्स रिक्वायर्ड</p>
        
        <input type="text" id="dramaUrl" placeholder="यहाँ ड्रामा लिंक पेस्ट करें...">
        <button onclick="getLink()">वीडियो लोड करें</button>

        <div id="resultBox">
            <p>✓ वीडियो सफलतापूर्वक लोड हो गया!</p>
            <div class="player-container">
                <iframe id="dramaPlayer" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>
    </div>

    <script>
        function getLink() {
            const urlInput = document.getElementById('dramaUrl').value;
            const resultBox = document.getElementById('resultBox');
            const player = document.getElementById('dramaPlayer');
            
            resultBox.style.display = 'none';
            if(!urlInput) { alert('कृपया पहले लिंक पेस्ट करें!'); return; }
            
            try {
                const urlParams = new URL(urlInput);
                const bookId = urlParams.searchParams.get('bid') || urlParams.searchParams.get('bookId');
                const episodeNum = urlParams.searchParams.get('episodeNumber') || '1';
                
                if (!bookId) {
                    alert('त्रुटि: लिंक में ड्रामा ID (bid) नहीं मिली!');
                    return;
                }
                
                // ड्रामाबॉक्स का ऑफिशियल वेब-प्लेयर आईफ्रेम रूट जो बिना किसी टोकन के सीधे वीडियो स्ट्रीम करता है
                const embedUrl = `https://www.dramaboxdb.com/index/play/index.html?bid=${bookId}&episodeNumber=${episodeNum}`;
                
                player.src = embedUrl;
                resultBox.style.display = 'block';
                
            } catch (err) {
                alert('कृपया एक सही ड्रामा यूआरएल लिंक डालें!');
            }
        }
    </script>
</body>
</html>
