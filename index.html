<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DramaBox Live Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-800 p-6 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
        <h1 class="text-2xl font-bold text-center text-cyan-400 mb-2">DramaBox Downloader</h1>
        <p class="text-xs text-center text-slate-400 mb-6">क्लाउड पावर्ड - नो टर्मक्स रिक्वायर्ड</p>
        
        <div class="space-y-4">
            <label class="block text-sm font-medium text-slate-300">एपिसोड लिंक पेस्ट करें:</label>
            <input type="text" id="dramaUrl" placeholder="https://sharet.dramabox.com/..." class="w-full p-3 rounded-lg bg-slate-950 border border-slate-700 text-white focus:outline-none focus:border-cyan-500 text-sm">
            
            <button onclick="getLink()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold p-3 rounded-lg transition duration-200">वीडियो लिंक निकालें</button>
        </div>

        <div id="resultBox" class="mt-6 p-4 rounded-lg bg-slate-950 border border-emerald-800 hidden">
            <p class="text-emerald-400 font-semibold text-sm text-center mb-3">✓ वीडियो लिंक मिल गया!</p>
            <a id="downloadBtn" href="#" target="_blank" class="block w-full text-center bg-emerald-600 hover:bg-emerald-500 text-white font-bold p-3 rounded-lg transition duration-200">वीडियो डाउनलोड / प्ले करें</a>
        </div>
    </div>

    <script>
        async function getLink() {
            const urlInput = document.getElementById('dramaUrl').value;
            const resultBox = document.getElementById('resultBox');
            const downloadBtn = document.getElementById('downloadBtn');
            
            if(!urlInput) return alert('कृपया पहले लिंक पेस्ट करें!');
            
            try {
                // यह अपने आप इसी डोमेन की API (/fetch) पर रिक्वेस्ट भेजेगा
                const response = await fetch(`/fetch?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();
                
                if(data.success && data.video_url) {
                    downloadBtn.href = data.video_url;
                    resultBox.classList.remove('hidden');
                } else {
                    alert('त्रुटि: ' + (data.error || 'वीडियो लिंक नहीं मिल पाया।'));
                }
            } catch(err) {
                alert('सर्वर कनेक्ट नहीं हो पाया: ' + err.message);
            }
        }
    </script>
</body>
</html>
